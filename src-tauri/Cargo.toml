[package]
name = "zebra-print-lab"
version = "0.1.0"
description = "ZebraPrintLab desktop shell"
authors = ["u8array"]
license = "MIT"
repository = "https://github.com/u8array/ZebraPrintLab"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "zebra_print_lab_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.3", features = [] }

[dependencies]
tauri = { version = "2.11.3", features = [] }

[target.'cfg(any(target_os = "macos", windows, target_os = "linux"))'.dependencies]
tauri-plugin-window-state = "2"

# Bundle-size profile from the official Tauri size guide.
[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true
